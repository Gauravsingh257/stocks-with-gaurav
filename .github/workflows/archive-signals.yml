name: Archive Daily Signals

# Pulls trade signals from Railway backend and commits them to
# signal_history/signals_YYYY.csv. Replaces the laptop "StocksWithGaurav_ArchiveSignals"
# Windows Task Scheduler task so signal archival is fully cloud-based.

on:
  schedule:
    # 11:00 UTC = 16:30 IST (Mon–Fri). After market close.
    - cron: "0 11 * * 1-5"
  workflow_dispatch:
    inputs:
      days:
        description: "Number of past days to archive"
        required: false
        default: "30"

concurrency:
  group: archive-signals
  cancel-in-progress: false

jobs:
  archive:
    name: Fetch + commit signals
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # allow commit + push back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run signal archiver
        env:
          RAILWAY_BACKEND_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
        run: |
          python scripts/archive_signals.py --days ${{ github.event.inputs.days || '30' }}

      - name: Commit + push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add signal_history/
          if git diff --cached --quiet; then
            echo "No new signals — nothing to commit."
          else
            git commit -m "chore(signals): archive $(date -u +%Y-%m-%d) [skip ci]"
            git push
            echo "Pushed updated signal_history/"
          fi
