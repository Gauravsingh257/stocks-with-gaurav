name: Kite Daily Auto-Login

# Fully automated Kite login — runs DAILY (incl. weekends) with TWO cron
# triggers. No laptop dependency whatsoever.
#
# Schedule (all times IST):
#   08:15 IST (02:45 UTC) — Primary morning login before market open
#   09:00 IST (03:30 UTC) — Fallback if primary was delayed past market open
#
# Pre-midnight cron removed: GitHub Actions cron delays often push it past
# midnight IST, creating a "today" token that blocks morning re-login even
# though Zerodha invalidates all tokens at 00:00 IST.
#
# Dedup: skips only if token_ts matches today AND the token is validated
# against Kite API (k.profile()). A date match with an invalid token
# triggers a fresh login.

on:
  schedule:
    # Primary morning:   02:45 UTC = 08:15 IST
    - cron: "45 2 * * *"
    # Morning fallback:  03:30 UTC = 09:00 IST
    - cron: "30 3 * * *"
  workflow_dispatch: {}  # allow manual trigger from the Actions tab

concurrency:
  group: kite-daily-login
  cancel-in-progress: false

jobs:
  login:
    name: Run auto_login.py
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyotp redis kiteconnect

      - name: Check if token is already fresh and valid today
        id: token_check
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
        run: |
          python -c "
          import os, sys
          from datetime import datetime, timezone, timedelta

          def write_output(skip):
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f'skip={\"true\" if skip else \"false\"}\n')

          IST = timezone(timedelta(hours=5, minutes=30))
          url = os.getenv('REDIS_URL', '')
          api_key = os.getenv('KITE_API_KEY', '')
          if not url:
              print('No REDIS_URL — proceeding with login')
              write_output(False); sys.exit(0)

          now = datetime.now(IST)
          try:
              import redis
              r = redis.from_url(url, decode_responses=True, socket_timeout=10)
              ts = r.get('kite:token_ts')
              tok = r.get('kite:access_token')
              if not (ts and tok):
                  print('No token in Redis — proceeding with login')
                  write_output(False); sys.exit(0)

              token_dt = datetime.fromisoformat(ts)
              if token_dt.date() != now.date():
                  print(f'Token date {token_dt.date()} != today {now.date()} — proceeding with login')
                  write_output(False); sys.exit(0)

              # Date matches today — but is the token actually valid?
              if not api_key:
                  print('No KITE_API_KEY to validate — proceeding with login')
                  write_output(False); sys.exit(0)

              from kiteconnect import KiteConnect
              k = KiteConnect(api_key=api_key)
              k.set_access_token(tok)
              profile = k.profile()
              name = profile.get('user_name', '?')
              print(f'Token valid today for {name} — skipping login')
              write_output(True)
          except Exception as e:
              print(f'Token date is today but INVALID ({e}) — proceeding with fresh login')
              write_output(False)
          "

      - name: Run Kite auto-login
        if: steps.token_check.outputs.skip != 'true'
        env:
          KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
          KITE_USER_ID: ${{ secrets.KITE_USER_ID }}
          KITE_PASSWORD: ${{ secrets.KITE_PASSWORD }}
          KITE_TOTP_SECRET: ${{ secrets.KITE_TOTP_SECRET }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          RAILWAY_BACKEND_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
          TRADES_SYNC_KEY: ${{ secrets.TRADES_SYNC_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python auto_login.py --scheduled
          echo "--- last 30 lines of auto_login.log ---"
          tail -n 30 auto_login.log || true

      - name: Verify Kite connection on Railway backend
        if: steps.token_check.outputs.skip != 'true'
        env:
          BACKEND_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
        run: |
          set -e
          echo "Checking $BACKEND_URL/api/system/health ..."
          health=$(curl -fsSL "$BACKEND_URL/api/system/health")
          echo "$health" | python -c "import json,sys; d=json.load(sys.stdin); print(f\"kite_connected={d.get('kite_connected')} token_source={d.get('token_source')} reason={d.get('kite_disconnect_reason','')}\"); sys.exit(0 if d.get('kite_connected') else 1)"
